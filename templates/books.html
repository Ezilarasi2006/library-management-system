{% extends 'layout.html' %}
{% block content %}
<div class="card">
    <h2>Manage Books</h2>
    <form method="post">
        <input type="hidden" name="book_id" value="{{ edit_book.id if edit_book else '' }}">
        <label>Title</label>
        <input type="text" name="title" value="{{ edit_book.title if edit_book else '' }}" required>
        <label>Author</label>
        <input type="text" name="author" value="{{ edit_book.author if edit_book else '' }}" required>
        <label>ISBN</label>
        <input type="text" name="isbn" value="{{ edit_book.isbn if edit_book else '' }}" required>
        <label>Category</label>
        <input type="text" name="category" value="{{ edit_book.category if edit_book else '' }}" required>
        <label>Quantity</label>
        <input type="number" name="quantity" min="1" value="{{ edit_book.quantity if edit_book else '1' }}" required>
        <button type="submit">{{ 'Update Book' if edit_book else 'Add Book' }}</button>
    </form>
</div>
<div class="card">
    <h3>Book List</h3>
    <table>
        <tr><th>Title</th><th>Author</th><th>ISBN</th><th>Qty</th><th>Available</th><th>Actions</th></tr>
        {% for book in books %}
        <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.isbn }}</td>
            <td>{{ book.quantity }}</td>
            <td>{{ book.available_quantity }}</td>
            <td>
                <a href="{{ url_for('books', edit=book.id) }}">Edit</a>
                <form method="post" style="display:inline;">
                    <input type="hidden" name="delete_id" value="{{ book.id }}">
                    <button type="submit" class="danger-btn">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
